name: Build and Push IDM-VTON RunPod Image

on:
  push:
    branches:
      - main
    paths:
      - "idm-vton-runpod/**"
      - ".github/workflows/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: mayankaggarwal8055/idm-vton-runpod:v45